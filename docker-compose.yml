services:
  db:
    image: pgvector/pgvector:pg16
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: chat_analyser
      POSTGRES_USER: chat_analyser
      POSTGRES_PASSWORD: chat_analyser
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat_analyser"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - 5432:5432

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 5s
      retries: 5

  tailwind:
    image: node:22-slim
    working_dir: /app
    tty: true
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install --silent && npm run watch"

  web:
    build: .
    command: sh -c "uv run manage.py migrate --no-input && uv run manage.py runserver 0.0.0.0:8000"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/.venv
    ports:
      - "8000:8000"
    environment:
      DEBUG: "True"
      DATABASE_URL: postgres://chat_analyser:chat_analyser@db:5432/chat_analyser
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      POSTGRES_DB: chat_analyser
      POSTGRES_USER: chat_analyser
      POSTGRES_PASSWORD: chat_analyser
      POSTGRES_HOST: db
      QDRANT_HOST: qdrant

    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_healthy

volumes:
  postgres_data:
  qdrant_data:
