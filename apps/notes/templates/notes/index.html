{% extends "notes/base.html" %} {% load static %} {% block content %}

<div class="app">
  <!-- ── Note list ──────────────────────────────── -->
  {% include "notes/partials/note_panel.html" %}

  <!-- ── Chat ──────────────────────────────────── -->
  <div class="panel chat-panel">
    <!-- Conversations sidebar -->
    <div class="convos-sidebar">
      <div class="convos-header">
        Chats
        <button class="btn-new" id="new-convo-btn" title="New chat">+</button>
      </div>
      <div class="convos-list" id="convos-list"></div>
    </div>

    <!-- Main chat -->
    <div class="chat-main">
      <div class="chat-messages" id="chat-messages"></div>
      <div class="chat-input-row">
        <textarea
          class="chat-input"
          id="chat-input"
          placeholder="Type a message…"
          rows="2"
        ></textarea>
        <button class="btn btn-primary" id="send-btn">Send</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Console ──────────────────────────────────────── -->
<div class="console-panel collapsed" id="console-panel">
  <div class="console-header" id="console-header">
    <div class="console-header-left">
      <span>LLM Console</span>
      <span class="console-badge" id="console-badge">0</span>
    </div>
    <button class="console-toggle" id="console-toggle" title="Toggle console">
      ▲
    </button>
  </div>
  <div class="console-body" id="console-body">
    <span class="console-empty">No messages yet.</span>
  </div>
</div>

{% endblock %} {% block scripts %}
<script type="module" src="{% static 'notes/chat.js' %}"></script>

<script type="module">
  import { api, esc } from '{% static "notes/utils.js" %}';
  import { Relay } from "/static/relay.js";

  // ── Dark mode ───────────────────────────────────────
  function setDark(dark) {
    document.body.classList.toggle("dark", dark);
    document.getElementById("dark-toggle").textContent = dark ? "☀" : "☽";
    localStorage.setItem("dark", dark ? "1" : "");
  }

  function toggleDark() {
    setDark(!document.body.classList.contains("dark"));
  }

  if (localStorage.getItem("dark")) setDark(true);
  document.getElementById("dark-toggle").addEventListener("click", toggleDark);

  // ── Console ─────────────────────────────────────────
  let consoleUnread = 0;

  function appendToConsole(message) {
    const body = document.getElementById("console-body");
    const empty = body.querySelector(".console-empty");
    if (empty) empty.remove();

    const now = new Date();
    const ts = now.toTimeString().slice(0, 8);
    const line = document.createElement("div");
    line.className = "console-line";
    line.innerHTML = `<span class="console-ts">${ts}</span><span class="console-msg">${esc(message)}</span>`;
    body.appendChild(line);
    body.scrollTop = body.scrollHeight;

    const panel = document.getElementById("console-panel");
    if (panel.classList.contains("collapsed")) {
      consoleUnread++;
      const badge = document.getElementById("console-badge");
      badge.textContent = consoleUnread;
      badge.classList.add("visible");
    }
  }

  function toggleConsole() {
    const panel = document.getElementById("console-panel");
    const btn = document.getElementById("console-toggle");
    const collapsed = panel.classList.toggle("collapsed");
    btn.textContent = collapsed ? "▲" : "▼";
    if (!collapsed) {
      consoleUnread = 0;
      const badge = document.getElementById("console-badge");
      badge.textContent = "0";
      badge.classList.remove("visible");
      document.getElementById("console-body").scrollTop =
        document.getElementById("console-body").scrollHeight;
    }
  }

  document
    .getElementById("console-header")
    .addEventListener("click", toggleConsole);

  // ── Notes ───────────────────────────────────────────
  let notes = [];

  async function loadNotes() {
    const data = await api("/api/notes/");
    notes = data.notes;
    renderNotes();
  }

  function renderNotes() {
    const list = document.getElementById("note-list");
    list.innerHTML = "";
    notes.forEach((note) => {
      const item = document.createElement("div");
      item.className = "note-item";
      item.dataset.id = note.id;
      item.innerHTML = `
      <span class="note-title">${esc(note.title)}</span>
      <div class="note-actions">
        <button class="btn btn-icon" title="Edit" data-action="edit">✎</button>
        <button class="btn btn-icon danger" title="Delete" data-action="delete">✕</button>
      </div>`;
      list.appendChild(item);
    });
  }

  async function addNote() {
    const input = document.getElementById("new-note-input");
    const title = input.value.trim();
    if (!title) return;
    const note = await api("/api/notes/add/", "POST", { title });
    if (note.error) return;
    notes.push(note);
    renderNotes();
    input.value = "";
  }

  function initNotePanel() {
    const input = document.getElementById("new-note-input");
    if (!input) return;
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") addNote();
    });
    document.getElementById("add-note-btn").addEventListener("click", addNote);
    document.getElementById("note-list").addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-action]");
      if (!btn) return;
      const id = parseInt(btn.closest(".note-item").dataset.id);
      if (btn.dataset.action === "edit") startEdit(id);
      if (btn.dataset.action === "delete") deleteNote(id);
    });
    loadNotes();
  }

  // ── Map ─────────────────────────────────────────────
  let map = null;
  let pendingPins = [];

  function dropPin({ lat, lng, label = "" }) {
    if (!map) {
      pendingPins.push({ lat, lng, label });
      return;
    }
    const marker = L.marker([lat, lng]).addTo(map);
    if (label) marker.bindPopup(label).openPopup();
    map.flyTo([lat, lng], 14);
  }

  function initMap() {
    map = L.map("map-container").setView([51.505, -0.09], 13);
    L.tileLayer(
      "https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",
      {
        attribution:
          '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/attributions">CARTO</a>',
        subdomains: "abcd",
        maxZoom: 20,
      },
    ).addTo(map);
    pendingPins.forEach(dropPin);
    pendingPins = [];
  }

  document.addEventListener("htmx:afterSwap", () => {
    if (document.getElementById("note-list")) initNotePanel();
    if (document.getElementById("map-container")) {
      map = null;
      initMap();
    } else map = null;
  });

  initNotePanel();

  function startEdit(id) {
    const item = document.querySelector(`.note-item[data-id="${id}"]`);
    const note = notes.find((n) => n.id === id);
    const titleSpan = item.querySelector(".note-title");
    const input = document.createElement("input");
    input.className = "note-title-input";
    input.value = note.title;
    titleSpan.replaceWith(input);
    input.focus();
    input.select();

    let committed = false;
    const commit = async () => {
      if (committed) return;
      committed = true;
      const newTitle = input.value.trim();
      if (!newTitle || newTitle === note.title) {
        renderNotes();
        return;
      }
      const updated = await api(`/api/notes/${id}/edit/`, "POST", {
        title: newTitle,
      });
      if (!updated.error) note.title = updated.title;
      renderNotes();
    };

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") commit();
      if (e.key === "Escape") {
        committed = true;
        renderNotes();
      }
    });
    input.addEventListener("blur", commit);
  }

  async function deleteNote(id) {
    await api(`/api/notes/${id}/delete/`, "POST");
    notes = notes.filter((n) => n.id !== id);
    renderNotes();
  }

  // ── Relay ────────────────────────────────────────────
  //
  // Tool schemas are defined server-side in ai/frontend_tools.py.
  // Here we register the browser-side handlers that run when
  // the LLM calls one of those tools. The server dispatches
  // the call via SSE; the relay receives it and calls the
  // matching handler.
  //
  // ─────────────────────────────────────────────────────
  window._relay = new Relay()
    .registerHtmxTriggers()
    .on("open_console", () => {
      if (document.getElementById("console-panel").classList.contains("collapsed")) toggleConsole();
    })
    .on("close_console", () => {
      if (!document.getElementById("console-panel").classList.contains("collapsed")) toggleConsole();
    })
    .on("log", ({ message }) => appendToConsole(message))
    .on("refresh_note_list", () => loadNotes())
    .on("set_dark_mode", ({ dark }) => setDark(dark))
    .on("go_to_coordinates", ({ lat, lng, zoom = 14 }) =>
      map?.flyTo([lat, lng], zoom),
    )
    .on("drop_pin", (args) => dropPin(args))
    .connect();
</script>
{% endblock %}
