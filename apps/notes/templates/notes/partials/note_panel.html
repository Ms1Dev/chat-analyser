<div class="panel note-panel" id="note-panel">
  <div class="panel-tabs">
    <button class="tab active">Notes</button>
    <button
      class="tab"
      hx-get="/panels/map/"
      hx-target="#note-panel"
      hx-swap="outerHTML"
      hx-trigger="click, swap-to-map"
      data-trigger="swap-to-map"
    >
      Map
    </button>
  </div>
  <div class="note-add">
    <input
      type="text"
      id="new-note-input"
      placeholder="Add a note…"
      autocomplete="off"
    />
    <button class="btn btn-primary" id="add-note-btn">Add</button>
  </div>
  <div class="note-list" id="note-list"></div>
</div>
