{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Notes{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="{% static 'notes/style.css' %}" />
    {% block extra_head %}{% endblock %}
  </head>
  <body>
    {% csrf_token %}

    <div class="topbar">
      <a class="topbar-title" href="{% url 'index' %}"
        >{% block topbar_title %}Notes App{% endblock %}</a
      >
      <div style="display: flex; gap: 6px; align-items: center">
        {% block topbar_actions %}{% endblock %}
        <button class="btn-icon" id="dark-toggle" title="Toggle dark mode">
          ☽
        </button>
      </div>
    </div>

    {% block content %}{% endblock %} {% block scripts %}{% endblock %}
  </body>
</html>
