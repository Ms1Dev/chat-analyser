
<div id="{{ message.id }}" class="chat chat-start group">
  <div class="chat-bubble chat-bubble-secondary">
    {{ message.content|linebreaks }}
  </div>
  <div class="chat-footer opacity-0 group-hover:opacity-100 transition-opacity duration-150 mt-1">
    <button
      class="btn btn-xs btn-ghost"
      hx-get="{% url 'message-analysis' message.id %}"
      hx-target="#analysis-modal-content"
      hx-swap="innerHTML"
      hx-on::after-request="document.getElementById('analysis-modal').showModal()"
    >
      Analyse
    </button>
  </div>
</div>
