{% extends "super_base.html" %}
{% block body %}
  <body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>

    {% csrf_token %}
    {% block global_nav %}
    <div class="navbar bg-base-100 shadow-sm shrink-0">
      <div class="flex-1">
        <a href="/" class="btn btn-ghost text-xl">Chat Analyser</a>
      </div>
      <div class="flex-none">
        <form method="post" action="{% url 'account_logout' %}">
          {% csrf_token %}
          <button type="submit" class="btn btn-ghost">Log out</button>
        </form>
      </div>
    </div>
    {% endblock %}

    {% block main %}
    <div class="flex-1 min-h-0 overflow-y-auto">
      {% block content %}{% endblock %}
    </div>
    {% endblock %}

    {% block scripts %}{% endblock %}
    <dialog id="analysis-modal" class="modal">
    <div class="modal-box w-11/12 max-w-5xl h-[80vh] flex flex-col">
      <div id="analysis-modal-content" class="flex-1 min-h-0 overflow-hidden"></div>
      <div class="modal-action mt-0">
        <form method="dialog">
          <button class="btn">Close</button>
        </form>
      </div>
    </div>
  </dialog>
  </body>

{% endblock %}
