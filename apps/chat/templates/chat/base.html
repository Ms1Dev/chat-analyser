{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Chat Analyser{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="{% static 'chat/tailwind.css' %}" />
    <link rel="stylesheet" href="{% static 'chat/style.css' %}" />
    {% block extra_head %}{% endblock %}
  </head>
  <body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>

    {% csrf_token %}
    <div class="navbar bg-base-100 shadow-sm">
      <div class="flex-1">
        <a href="/" class="btn btn-ghost text-xl">Chat Analyser</a>
      </div>
      <div class="flex-none">
        <ul class="menu menu-horizontal px-1">
          <li>
            <a
              hx-get="{% url 'settings' %}"
              hx-target="#chat-main"
              hx-swap="innerHTML"
              hx-push-url="true"
              class="btn-icon"
              title="Settings"
            >⚙</a>
          </li>
          <li>
            <button class="btn-icon" id="dark-toggle" title="Toggle dark mode">☽</button>
          </li>
          <li>
            <form method="post" action="{% url 'account_logout' %}" style="margin:0">
              {% csrf_token %}
              <button type="submit" class="btn-icon" title="Sign out">⏻</button>
            </form>
          </li>
        </ul>
      </div>
    </div>

    {% block content %}{% endblock %} {% block scripts %}{% endblock %}
  </body>
</html>
