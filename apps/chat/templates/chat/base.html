{% extends "super_base.html" %}
{% block body %}
  <body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>

    {% csrf_token %}
    <div class="navbar bg-base-100 shadow-sm">
      <div class="flex-1">
        <a href="/" class="btn btn-ghost text-xl">Chat Analyser</a>
      </div>
      <div class="flex-none">
        <ul class="menu menu-horizontal px-1">
          <li>
            <a
              hx-get="{% url 'settings' %}"
              hx-target="#chat-main"
              hx-swap="innerHTML"
              hx-push-url="true"
              class="btn-icon"
              title="Settings"
            >⚙</a>
          </li>
          <li>
            <button class="btn-icon" id="dark-toggle" title="Toggle dark mode">☽</button>
          </li>
          <li>
            <form method="post" action="{% url 'account_logout' %}" style="margin:0">
              {% csrf_token %}
              <button type="submit" class="btn-icon" title="Sign out">⏻</button>
            </form>
          </li>
        </ul>
      </div>
    </div>

    {% block content %}{% endblock %} {% block scripts %}{% endblock %}
    <dialog id="analysis-modal" class="modal">
    <div class="modal-box w-11/12 max-w-5xl h-[80vh] flex flex-col">
      <div id="analysis-modal-content" class="flex-1 min-h-0 overflow-hidden"></div>
      <div class="modal-action mt-0">
        <form method="dialog">
          <button class="btn">Close</button>
        </form>
      </div>
    </div>
  </dialog>
  </body>

{% endblock %}
