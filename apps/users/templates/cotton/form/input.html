<div class="form-control">
    <label class="label" for="{{ id }}">
        <span class="label-text">{{ label }}</span>
    </label>
    <input 
        type="{{ type }}"     
        name="{{ name }}" 
        id="{{ id }}"
        placeholder="{{ placeholder }}"
        class="
        {% if disabled %}bg-gray-100 text-gray-500{% endif %}
        {% if readonly %}bg-gray-100{% endif %}
        w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm"
        {% if required %}required{% endif %} 
        {% if readonly or disabled %}disabled{% endif %}
        value="{{ value|default_if_none:'' }}"
    >
</div>
