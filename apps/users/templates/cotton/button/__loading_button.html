{% load filters %}
{% random_string 10 as rand %}
<button 
    {% if hx_get %}
        hx-get="{{ hx_get }}"
        hx-target="#inner-content"
        hx-swap="{{ hx_swap | default:'innerHTML' }}"
        hx-trigger="{{ hx_trigger | default:'click' }}"
    {% elif href %}
        onclick="{{ onClick }}; window.location.href='{{ href }}';"
    {% endif %}
    type="{{ type | default:'button' }}"
    class="{{ class }}" 
    hx-indicator="#spinner-{{ rand }}" 
>   
    <svg class="spinner animate-spin" id="spinner-{{ rand }}" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg>
    <span class="button-text">{{ slot }}</span>
</button>
