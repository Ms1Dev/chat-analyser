{% extends "chat/base.html" %}

{% block content %}


<h2 class="text-2xl font-bold mb-8">User Settings</h2>


<div
    hx-get="{% url "account_change_password" %}"
    hx-trigger="load"
    hx-boost="true"
    hx-push-url="false"
    hx-target="this"
>
</div>

<div
    hx-get="{% url "account_email" %}"
    hx-trigger="load"
    hx-boost="true"
    hx-push-url="false"
    hx-target="this"
>
</div>

<div class="p-4 border-t border-base-300/50 mt-4">
  <form method="post" action="{% url 'account_logout' %}">
    {% csrf_token %}
    <button type="submit" class="btn btn-error btn-outline btn-sm gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-linejoin="round" stroke-linecap="round" stroke-width="2" fill="none" stroke="currentColor" class="size-4"><path d="M14 8v-2a2 2 0 0 0 -2 -2h-7a2 2 0 0 0 -2 2v12a2 2 0 0 0 2 2h7a2 2 0 0 0 2 -2v-2"></path><path d="M9 12h12l-3 -3"></path><path d="M18 15l3 -3"></path></svg>
      Log out
    </button>
  </form>
</div>
{% endblock %}
