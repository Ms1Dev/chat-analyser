{% if has_more %}
<div id="load-more-sentinel"
     hx-get="{% url 'conversation-messages' conversation_id %}?before={{ oldest_id }}"
     hx-trigger="intersect once"
     hx-target="this"
     hx-swap="outerHTML">
  <div class="flex justify-center p-2 text-base-content/40">
    <span class="loading loading-spinner loading-sm"></span>
  </div>
</div>
{% endif %}
