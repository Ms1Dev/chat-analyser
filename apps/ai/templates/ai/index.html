{% extends "ai/base.html" %} {% load static %} {% block content %}

<div class="app">

  <!-- ── Chat ──────────────────────────────────── -->
  <div class="panel chat-panel">
    <!-- Conversations sidebar -->
    <div class="convos-sidebar bg-base-200">
      <div class="convos-header bg-white/80 dark:bg-gray-800/80">
        Chats
        <button class="btn-new" id="new-convo-btn" title="New chat">+</button>
      </div>
      {% include "ai/chat/conversation_list.html" %}
    </div>

    <!-- Main chat -->
    <div class="chat-main" id="chat-main">
      {% if conversation_id %}
        {% include "ai/chat/window.html" %}
      {% else %}
        {% include "ai/chat/start.html" %}
      {% endif %}
    </div>
  </div>
</div>


{% endblock %} {% block scripts %}
<script type="module" src="{% static 'ai/chat.js' %}"></script>

<script type="module">
  import { api, esc } from '{% static "ai/utils.js" %}';
  import { Relay } from "/static/relay.js";

  // ── Dark mode ───────────────────────────────────────
  function setDark(dark) {
    document.body.classList.toggle("dark", dark);
    document.getElementById("dark-toggle").textContent = dark ? "☀" : "☽";
    localStorage.setItem("dark", dark ? "1" : "");
  }

  function toggleDark() {
    setDark(!document.body.classList.contains("dark"));
  }

  if (localStorage.getItem("dark")) setDark(true);
  document.getElementById("dark-toggle").addEventListener("click", toggleDark);


  function scrollChat() {
    const msgs = document.getElementById("chat-messages");
    if (msgs) msgs.scrollTop = msgs.scrollHeight;
  }

  document.body.addEventListener('scroll-to-bottom', () => {
    const msgs = document.getElementById("chat-messages");
    if (msgs) msgs.scrollTo({ top: msgs.scrollHeight, behavior: 'smooth' });
  });

  // ── Relay ────────────────────────────────────────────
  window._relay = new Relay()
    .registerHtmxTriggers()
    .on("set_dark_mode", ({ dark }) => setDark(dark))
    .on("chat_token", ({ text }) => {
      const bubble = document.querySelector(".assistant-typing .chat-bubble");
      if (bubble) { bubble.textContent += text; scrollChat(); }
    })
    .on("chat_done", ({ html }) => {
      const typing = document.querySelector(".assistant-typing");
      if (typing && html) typing.outerHTML = html;
      const btn = document.querySelector("#chat-input button[type=submit]");
      if (btn) btn.disabled = false;
    })
    .connect();
</script>
{% endblock %}
